<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff416c, #1e90ff, #7b2ff7);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
            color: white;
            min-height: 100vh;
        }

        @keyframes bg {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1 {
            margin-top: 20px;
            font-size: 40px;
        }

        #status {
            font-size: 22px;
            margin-top: 10px;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .cell {
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cell:hover {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.3);
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.08);
        }

        /* ===== MOBILE MEDIA QUERY ===== */

        @media (max-width: 600px) {

            h1 {
                font-size: 30px;
            }

            #status {
                font-size: 18px;
                padding: 0 10px;
            }

            .board {
                grid-template-columns: repeat(3, 90px);
                gap: 8px;
            }

            .cell {
                width: 90px;
                height: 90px;
                font-size: 40px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <h1>🎮 Tic Tac Toe</h1>

    <p>MADE BY MUHAMMAD NOMAN</p>

    <div id="status">Player X's Turn</div>

    <div class="board">

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

    </div>

    <button onclick="resetGame()">🔄 Reset Game</button>

    <script>

        let currentPlayer = "X";
        let gameActive = true;

        const statusText = document.getElementById("status");
        const cells = document.querySelectorAll(".cell");

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        cells.forEach(cell => {

            cell.addEventListener("click", () => {

                if (!gameActive || cell.textContent !== "") {
                    return;
                }

                cell.textContent = currentPlayer;

                checkWinner();

                if (gameActive) {
                    currentPlayer = currentPlayer === "X" ? "O" : "X";
                    statusText.textContent = `Player ${currentPlayer}'s Turn`;
                }

            });

        });

        function checkWinner() {

            let board = Array.from(cells).map(cell => cell.textContent);

            for (let pattern of winPatterns) {

                let [a, b, c] = pattern;

                if (
                    board[a] &&
                    board[a] === board[b] &&
                    board[a] === board[c]
                ) {

                    statusText.textContent = `🎉 Player ${board[a]} Wins!`;
                    gameActive = false;
                    return;
                }
            }

            if (!board.includes("")) {
                statusText.textContent = "🤝 It's a Draw!";
                gameActive = false;
            }
        }

        function resetGame() {

            cells.forEach(cell => {
                cell.textContent = "";
            });

            currentPlayer = "X";
            gameActive = true;
            statusText.textContent = "Player X's Turn";
        }

    </script>

</body>

</html>
